name: Build and Push Backend Docker Image

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-cloud-run.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/crm-energia-api:latest
            ghcr.io/${{ github.repository }}/crm-energia-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Info
        run: |
          echo "✅ Docker image built and pushed to GitHub Container Registry"
          echo "Image: ghcr.io/${{ github.repository }}/crm-energia-api:latest"
          echo "SHA Tag: ghcr.io/${{ github.repository }}/crm-energia-api:${{ github.sha }}"
